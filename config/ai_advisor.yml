enabled: true

provider: gemini
model_env: GEMINI_MODEL
timeout_seconds: 20
max_ads: 8
max_output_tokens: 2048
thinking_budget: 0
max_gemini_calls_per_run: 2
retry_on_invalid_json: true
retry_on_transient_api_error: true
retry_delay_seconds: 5

free_tier_guardrails:
  expected_runs_per_day: 48
  max_calls_per_run: 2
  expected_max_calls_per_day: 96
  gemini_2_5_flash_free_rpd: 250
  gemini_2_5_flash_free_rpm: 10
  gemini_2_5_flash_free_tpm: 250000

objective: CPAを悪化させずCVを増やす

thresholds:
  target_cpa: 5000
  min_spend_for_pause_review: 3000
  min_spend_for_creative_review: 2000
  min_conversions_for_keep: 1
  min_conversions_for_scale_review: 2

actions:
  allow_pause_suggestion: true
  allow_resume_suggestion: true
  allow_creative_suggestion: true
  allow_auto_pause_by_ai: false
  allow_auto_resume_by_ai: false
  allow_auto_create_ads_by_ai: false

notification:
  include_ai_summary: true
  include_pause_candidates: true
  include_resume_candidates: true
  include_creative_suggestions: true
  max_items_per_section: 5
