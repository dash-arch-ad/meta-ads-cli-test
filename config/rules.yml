mode: active

meta:
  ad_account_id: "act_xxxxxxxxxx"
  conversion_event: "purchase"

target:
  allowed_campaign_ids:
    - "SET_META_ALLOWED_CAMPAIGN_IDS_IN_SECRET"

schedule:
  interval_minutes: 30

rules:
  - name: zero_purchase_64000_pause
    level: ad
    window: "last_90d"
    spend_gt: 50000
    conversions_lt: 1
    action: pause_ad

safety:
  max_pauses_per_run: 100
  allow_delete: false
  allow_campaign_change: false
  allow_adset_change: false
  allow_budget_change: false
