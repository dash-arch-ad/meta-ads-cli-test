name: Meta Ads Local Guard
on:
  workflow_dispatch:
  schedule:
    - cron: "7,37 * * * *"
permissions:
  contents: write
jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      META_GUARD_ENV: ${{ secrets.META_GUARD_ENV }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Keep alive (empty commit if 50 days since last update)
        shell: bash
        run: |
          LAST=$(git log -1 --format="%ct")
          NOW=$(date +%s)
          DIFF=$(( (NOW - LAST) / 86400 ))
          if [ "$DIFF" -ge 50 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit --allow-empty -m "chore: keep alive (${DIFF} days since last commit)"
            git push
          fi
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -r requirements-github.txt
      - name: Create private env file
        shell: bash
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          value = os.environ.get("META_GUARD_ENV", "")
          if not value.strip():
              raise SystemExit("META_GUARD_ENV secret is not set.")
          Path(".env").write_text(value, encoding="utf-8")
          PY
      - name: Run guard
        run: python scripts/monitor_meta_ads.py --config config/rules.yml
