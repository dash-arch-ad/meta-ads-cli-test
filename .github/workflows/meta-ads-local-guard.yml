name: Meta Ads Local Guard

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      META_GUARD_ENV: ${{ secrets.META_GUARD_ENV }}
      META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
      META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
      META_ALLOWED_CAMPAIGN_IDS: ${{ secrets.META_ALLOWED_CAMPAIGN_IDS }}
      CHATWORK_API_TOKEN: ${{ secrets.CHATWORK_API_TOKEN }}
      CHATWORK_ROOM_ID: ${{ secrets.CHATWORK_ROOM_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: gemini-2.5-flash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements-github.txt

      - name: Create private env file
        shell: bash
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          value = os.environ.get("META_GUARD_ENV", "")
          if value.strip():
              Path(".env").write_text(value, encoding="utf-8")
          else:
              print("META_GUARD_ENV is not set; using individual GitHub Secrets from job env.")
          PY

      - name: Run guard
        run: python scripts/monitor_meta_ads.py --config config/rules.yml
